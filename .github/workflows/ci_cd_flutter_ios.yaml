name: Flutter iOS CI/CD

on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.10.6'

    - name: Install dependencies
      run: flutter pub get

    # - name: Setup keychain
    #   run: |
    #     security create-keychain -p "" build.keychain
    #     security import <(echo "$DEVELOPER_CERTIFICATE" | base64 --decode) -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
    #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
    #     security default-keychain -s build.keychain
    #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
    #     echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
    #   env:
    #     DEVELOPER_CERTIFICATE: ${{ secrets.DEVELOPER_CERTIFICATE }}
    #     CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
    #     PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}


      # Install the Apple certificate and provisioning profile 
    - name: Install the Apple certificate and provisioning profile
      env:
        # BUILD_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_CERTIFICATE }}
        P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        BUILPROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        DISTRIBUTION_CERTIFICATE: ${{ secrets.DISTRIBUTION_CERTIFICATE }}
      run: |
        # create variables
        # CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        DIS_CERTIFICATE_PATH=$RUNNER_TEMP/dis_build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        
        # import certificate and provisioning profile from secrets
        # echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH
        echo -n "$DISTRIBUTION_CERTIFICATE" | base64 --decode --output $DIS_CERTIFICATE_PATH
        
        # create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # import certificate to keychain
        # security import $CERTIFICATE_PATH -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security import $DIS_CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        
        # apply provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

    - name: Run Flutter tests
      run: flutter test

    # - name: Install CocoaPods dependencies
    #   run: |
    #     cd ios
    #     pod install
    #   env:
    #     LANG: en_US.UTF-8

    - name: Build iOS
      run: |
        flutter build ios --release --no-codesign

    # - name: Archive and export for distribution
    #   run: |
    #     xcodebuild -workspace ios/Runner.xcworkspace \
    #                -scheme Runner \
    #                -sdk iphoneos \
    #                -configuration Release \
    #                archive \
    #                -archivePath $PWD/build/Runner.xcarchive \
    #                DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }} \
    #                -allowProvisioningUpdates
                   
    #     xcodebuild -exportArchive \
    #                -archivePath $PWD/build/Runner.xcarchive \
    #                -exportOptionsPlist ios/Flutter/ExportOptions.plist \
    #                -exportPath $PWD/build/ios_release


    - name: Build IPA
      run: |
        flutter build ipa \
          --export-options-plist=ios/Flutter/ExportOptions.plist \
          --build-name=${{ github.run_number }} \
          --build-number=${{ github.run_id }} \
          --build-name="${{ github.ref }}" \
          --no-codesign \
          --release


    - name: 🍏🚀 Deploy to App Store (Testflight)
      uses: apple-actions/upload-testflight-build@v1
      with:
         app-path: ${{ github.workspace }}/app/build/ios/ipa/flutter_ci_cd_demo.ipa
         issuer-id: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
         api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
         api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}

    # - name: Code sign IPA
    #   run: |
    #     xcodebuild -exportArchive \
    #       -archivePath build/ios/archive/Runner.xcarchive \
    #       -exportPath build/ios/ipa \
    #       -exportOptionsPlist ios/Flutter/ExportOptions.plist \
    #       DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }}
    #       -allowProvisioningUpdates
          

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: ios-release
        path: build/ios_release
